<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroTV — Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --accent: #6c63ff;
      --text: #e8e8f0; --text-dim: #888899; --border: #2a2a3a;
    }
    html, body {
      width: 100%; height: 100%;
      background: #000; color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }
    #player-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: rgba(10,10,15,0.95); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; z-index: 100; transition: opacity 0.3s;
    }
    #player-bar.oculto { opacity: 0; pointer-events: none; }
    .pbar-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); font-size: 14px; padding: 7px 14px;
      border-radius: 6px; cursor: pointer; transition: all 0.15s;
      white-space: nowrap; outline: none;
    }
    .pbar-btn:hover, .pbar-btn:focus {
      border-color: var(--accent); color: var(--text);
      background: rgba(108,99,255,0.15);
      box-shadow: 0 0 0 2px rgba(108,99,255,0.3);
    }
    #player-title {
      flex: 1; font-size: 17px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pbar-hint { font-size: 13px; color: var(--text-dim); }
    #emulator-wrap {
      position: fixed; top: 56px; left: 0; right: 0; bottom: 0; background: #000;
    }
    #emulator-wrap.fullscreen { top: 0; }
    #game { width: 100%; height: 100%; }
    #status-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; z-index: 50; gap: 20px;
    }
    #status-overlay.hidden { display: none; }
    #status-icon { font-size: 64px; }
    #status-msg { font-size: 24px; font-weight: 600; text-align: center; max-width: 600px; }
    #status-sub { font-size: 17px; color: var(--text-dim); text-align: center; max-width: 600px; }
    #btn-voltar-err {
      margin-top: 20px; background: var(--accent); border: none;
      color: white; font-size: 18px; font-weight: 700;
      padding: 14px 32px; border-radius: 10px; cursor: pointer; outline: none;
    }
    #btn-voltar-err:hover, #btn-voltar-err:focus {
      filter: brightness(1.2); box-shadow: 0 0 0 3px rgba(108,99,255,0.4);
    }
  </style>
</head>
<body>

<div id="status-overlay">
  <div id="status-icon">⏳</div>
  <div id="status-msg">Carregando jogo...</div>
  <div id="status-sub">Aguarde, isso pode levar alguns segundos.</div>
  <button id="btn-voltar-err" style="display:none" onclick="voltarBiblioteca()">← Voltar à Biblioteca</button>
</div>

<div id="player-bar">
  <button class="pbar-btn" id="btn-sair">⬅ Sair</button>
  <span id="player-title">—</span>
  <button class="pbar-btn" id="btn-salvar">💾 Salvar</button>
  <button class="pbar-btn" id="btn-carregar">📂 Carregar</button>
  <button class="pbar-btn" id="btn-full">⛶ Full</button>
  <span class="pbar-hint">ESC=Sair &nbsp; S=Salvar &nbsp; L=Carregar &nbsp; F=Tela Cheia</span>
</div>

<div id="emulator-wrap">
  <div id="game"></div>
</div>

<script>
(function () {
  'use strict';

  var overlay     = document.getElementById('status-overlay');
  var overlayMsg  = document.getElementById('status-msg');
  var overlaySub  = document.getElementById('status-sub');
  var overlayIcon = document.getElementById('status-icon');
  var btnVoltarErr = document.getElementById('btn-voltar-err');
  var playerTitle = document.getElementById('player-title');
  var bar         = document.getElementById('player-bar');
  var emWrap      = document.getElementById('emulator-wrap');

  function voltarBiblioteca() {
    window.location.href = 'index.html';
  }
  window.voltarBiblioteca = voltarBiblioteca;

  function mostrarErro(msg, sub) {
    overlayIcon.textContent = '❌';
    overlayMsg.textContent  = msg;
    overlaySub.textContent  = sub || '';
    btnVoltarErr.style.display = 'inline-block';
    btnVoltarErr.focus();
    overlay.classList.remove('hidden');
  }

  var gameInfo = null;
  try {
    var raw = sessionStorage.getItem('retrotv_current');
    if (raw) gameInfo = JSON.parse(raw);
  } catch (e) { gameInfo = null; }

  if (!gameInfo || !gameInfo.id || !gameInfo.core) {
    mostrarErro('Nenhum jogo selecionado.', 'Volte à biblioteca e escolha um jogo.');
    return;
  }

  playerTitle.textContent = gameInfo.nome || 'Jogo';
  document.title = 'RetroTV — ' + (gameInfo.nome || 'Jogo');

  var DB_NAME = 'RetroTVDB';
  var DB_VER  = 1;
  var STORE   = 'roms';

  function abrirDB() {
    return new Promise(function (resolve, reject) {
      var req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = function (e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains(STORE)) {
          d.createObjectStore(STORE, { keyPath: 'id' });
        }
      };
      req.onsuccess = function (e) { resolve(e.target.result); };
      req.onerror   = function (e) { reject(e.target.error); };
    });
  }

  function buscarROM(db, id) {
    return new Promise(function (resolve, reject) {
      var tx  = db.transaction(STORE, 'readonly');
      var req = tx.objectStore(STORE).get(id);
      req.onsuccess = function (e) { resolve(e.target.result); };
      req.onerror   = function (e) { reject(e.target.error); };
    });
  }

  function launchEmulator(blob) {
    var cdn = gameInfo.cdn || 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_player        = '#game';
    window.EJS_gameName      = gameInfo.nome || 'game';
    window.EJS_gameUrl       = blob;
    window.EJS_core          = gameInfo.core;
    window.EJS_pathtodata    = cdn;
    window.EJS_startOnLoaded = true;
    window.EJS_language      = 'pt-BR';
    window.EJS_volume        = 0.8;
    window.EJS_onGameStart   = function () {
      overlay.classList.add('hidden');
    };
    var script    = document.createElement('script');
    script.src    = cdn + 'loader.js';
    script.onerror = function () {
      mostrarErro(
        'Falha ao carregar EmulatorJS.',
        'Verifique sua conexão com a internet e tente novamente.'
      );
    };
    document.body.appendChild(script);
  }

  if (gameInfo.nativePath) {
    // Arquivo nativo — ler via XHR e converter para Blob (EmulatorJS não suporta file:// direto)
    overlayMsg.textContent = 'Carregando ROM do disco...';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', gameInfo.nativePath, true);
    xhr.responseType = 'arraybuffer';
    xhr.onload = function () {
      if (xhr.status === 0 || xhr.status === 200) {
        var blob = new Blob([xhr.response], { type: 'application/octet-stream' });
        launchEmulator(blob);
      } else {
        mostrarErro('Erro ao carregar ROM (' + xhr.status + ').', 'Reimporte o jogo e tente novamente.');
      }
    };
    xhr.onerror = function () {
      mostrarErro('Não foi possível ler o arquivo.', 'Reimporte o jogo e tente novamente.');
    };
    xhr.send();
  } else {
    // Arquivo no IndexedDB (importado pelo browser)
    abrirDB().then(function (db) {
      return buscarROM(db, gameInfo.id);
    }).then(function (row) {
      if (!row || !row.dados) {
        mostrarErro('ROM não encontrada.', 'Importe o jogo novamente.');
        return;
      }
      var blob = new Blob([row.dados], { type: 'application/octet-stream' });
      launchEmulator(blob);
    }).catch(function (err) {
      mostrarErro('Erro ao ler banco de dados.', String(err));
    });
  }

  document.getElementById('btn-sair').addEventListener('click', voltarBiblioteca);

  document.getElementById('btn-salvar').addEventListener('click', function () {
    if (window.EJS_emulator) {
      try { window.EJS_emulator.saveState(); } catch (e) {}
    }
  });

  document.getElementById('btn-carregar').addEventListener('click', function () {
    if (window.EJS_emulator) {
      try { window.EJS_emulator.loadState(); } catch (e) {}
    }
  });

  var modoFull = false;

  function toggleFull() {
    modoFull = !modoFull;
    if (modoFull) {
      bar.classList.add('oculto');
      emWrap.classList.add('fullscreen');
    } else {
      bar.classList.remove('oculto');
      emWrap.classList.remove('fullscreen');
    }
  }

  document.getElementById('btn-full').addEventListener('click', toggleFull);

  document.addEventListener('keydown', function (e) {
    var k = e.key || '';
    var kc = e.keyCode || 0;
    if (k === 'Escape' || kc === 27) { voltarBiblioteca(); return; }
    if (k === 's' || k === 'S') {
      if (window.EJS_emulator) { try { window.EJS_emulator.saveState(); } catch (_) {} }
    }
    if (k === 'l' || k === 'L') {
      if (window.EJS_emulator) { try { window.EJS_emulator.loadState(); } catch (_) {} }
    }
    if (k === 'f' || k === 'F') { toggleFull(); }
  });

})();
</script>
</body>
</html>
